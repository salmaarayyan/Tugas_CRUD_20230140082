<!DOCTYPE html>
<html>
<head>
    <title>CRUD KTP</title>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>

        body{
            font-family: Arial;
            margin:40px;
        }

        input,select{
            padding:8px;
            margin:5px;
        }

        button{
            padding:8px 12px;
            margin:5px;
        }

        table{
            border-collapse: collapse;
            margin-top:20px;
            width:100%;
        }

        th,td{
            border:1px solid black;
            padding:8px;
            text-align:center;
        }

    </style>

</head>

<body>

<h2>DATA KTP</h2>

<form id="ktpForm">

    <input type="hidden" id="id">

    <input type="text" id="nomorKtp" placeholder="Nomor KTP" required>

    <input type="text" id="namaLengkap" placeholder="Nama Lengkap" required>

    <input type="text" id="alamat" placeholder="Alamat" required>

    <input type="date" id="tanggalLahir" required>

    <select id="jenisKelamin">
        <option value="">Pilih Jenis Kelamin</option>
        <option value="Laki-laki">Laki-laki</option>
        <option value="Perempuan">Perempuan</option>
    </select>

    <button type="submit">Simpan</button>

</form>

<h3>Data KTP</h3>

<table>

    <thead>

    <tr>
        <th>ID</th>
        <th>Nomor KTP</th>
        <th>Nama</th>
        <th>Alamat</th>
        <th>Tanggal Lahir</th>
        <th>Jenis Kelamin</th>
        <th>Aksi</th>
    </tr>

    </thead>

    <tbody id="tableBody"></tbody>

</table>

<script>

    $(document).ready(function(){

    loadData();

    });

    function loadData(){

    $.ajax({

    url:"/ktp",
    method:"GET",
    success:function(data){

    let rows="";

    data.forEach(function(item){

    rows += `
    <tr>

    <td>${item.id}</td>
    <td>${item.nomorKtp}</td>
    <td>${item.namaLengkap}</td>
    <td>${item.alamat}</td>
    <td>${item.tanggalLahir}</td>
    <td>${item.jenisKelamin}</td>

    <td>

    <button onclick="editData(${item.id})">Edit</button>

    <button onclick="deleteData(${item.id})">Delete</button>

    </td>

    </tr>
    `;

    });

    $("#tableBody").html(rows);

    }

    });

    }

    $("#ktpForm").submit(function(e){

    e.preventDefault();

    let id = $("#id").val();

    let data = {

    nomorKtp: $("#nomorKtp").val(),
    namaLengkap: $("#namaLengkap").val(),
    alamat: $("#alamat").val(),
    tanggalLahir: $("#tanggalLahir").val(),
    jenisKelamin: $("#jenisKelamin").val()

    };

    if(id == ""){

    $.ajax({

    url:"/ktp",
    method:"POST",
    contentType:"application/json",
    data:JSON.stringify(data),

    success:function(){

    alert("Data berhasil ditambahkan");

    loadData();

    $("#ktpForm")[0].reset();

    }

    });

    }else{

    $.ajax({

    url:"/ktp/"+id,
    method:"PUT",
    contentType:"application/json",
    data:JSON.stringify(data),

    success:function(){

    alert("Data berhasil diupdate");

    loadData();

    $("#ktpForm")[0].reset();

    $("#id").val("");

    }

    });

    }

    });

    function editData(id){

    $.ajax({

    url:"/ktp/"+id,
    method:"GET",

    success:function(data){

    $("#id").val(data.id);
    $("#nomorKtp").val(data.nomorKtp);
    $("#namaLengkap").val(data.namaLengkap);
    $("#alamat").val(data.alamat);
    $("#tanggalLahir").val(data.tanggalLahir);
    $("#jenisKelamin").val(data.jenisKelamin);

    }

    });

    }

    function deleteData(id){

    if(confirm("Yakin hapus data?")){

    $.ajax({

    url:"/ktp/"+id,
    method:"DELETE",

    success:function(){

    alert("Data berhasil dihapus");

    loadData();

    }

    });

    }

    }

</script>

</body>
</html>
